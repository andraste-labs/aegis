<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
</head>
<body>
  <header class="hero">
    <h1>Notes</h1>
    <p class="tagline">Capture every thought.</p>
  </header>
  <main class="layout">
    <aside class="sidebar">
      <ul>
        <li>Inbox</li>
        <li>Today</li>
        <li>Pinned</li>
      </ul>
    </aside>
    <section class="detail">
      <article class="note">
        <h2>Project Aegis kickoff</h2>
        <p>Notes from the meeting…</p>
      </article>
    </section>
  </main>
</body>
</html>
