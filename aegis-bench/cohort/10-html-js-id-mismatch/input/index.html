<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light">
    <main class="card">
      <h1>Tip Calculator</h1>

      <label for="bill">Bill amount</label>
      <input id="bill" type="number" min="0" step="0.01" value="50.00" />

      <label for="people-count">People</label>
      <div class="people-row">
        <button id="people-decrement" aria-label="decrement">−</button>
        <output id="people-count">2</output>
        <button id="people-increment" aria-label="increment">+</button>
      </div>

      <button id="calculate-btn" class="primary">Calculate</button>

      <section class="results" aria-live="polite">
        <p>Tip per person: <output id="tip-per-person">—</output></p>
        <p>Total per person: <output id="total-per-person">—</output></p>
      </section>

      <button id="theme-switch" aria-label="toggle theme">🌙</button>
    </main>
    <script src="app.js"></script>
  </body>
</html>
